networks:
  fd:
    driver: bridge


services:

  vote:
    image: nimesaji/vote_py:v1 
    build:
      context: ./vote
    ports:
      - "5000:80"
    depends_on:
      - redis 
    networks:
      - fd

  redis:
    image: redis:6.0-alpine 
    networks:
      - fd


  db:
    image: postgres:15.18-alpine3.24
    networks:
      - fd
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust

  result:
    image: nimesaji/result:latest 
    build:
      context: ./result
    ports:
      - "5001:4000"
    depends_on:
      - db
    networks:
      - fd 

  worker:
    image: nimesaji/work:latest  
    build:
      context: ./worker
    depends_on:
      - redis
      - db
    networks:
      - fd
